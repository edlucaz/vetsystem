<svg width="680" height="870" viewBox="0 0 680 870" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; font-family: Arial, sans-serif;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Título -->
<text font-size="15" font-weight="bold" fill="#1B1B1B" x="340" y="28" text-anchor="middle">Fluxo simplificado — VETSystem</text>
<text font-size="12" fill="#666" x="340" y="46" text-anchor="middle">Ator único: Sra. Fernanda (veterinária/proprietária)</text>

<!-- INÍCIO -->
<rect x="255" y="64" width="170" height="40" rx="20" fill="#E8E8E4" stroke="#888" stroke-width="0.5"/>
<text font-size="13" font-weight="bold" fill="#333" x="340" y="89" text-anchor="middle">Início</text>
<line x1="340" y1="104" x2="340" y2="128" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- 1. Acessar sistema -->
<rect x="220" y="128" width="240" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="13" font-weight="bold" fill="#085041" x="340" y="151" text-anchor="middle">Acessar o VETSystem</text>
<text font-size="11" fill="#0F6E56" x="340" y="169" text-anchor="middle">URL pública (Railway)</text>
<line x1="340" y1="180" x2="340" y2="204" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- 2. Login -->
<rect x="220" y="204" width="240" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="13" font-weight="bold" fill="#085041" x="340" y="227" text-anchor="middle">Efetuar login</text>
<text font-size="11" fill="#0F6E56" x="340" y="245" text-anchor="middle">Usuário e senha Django</text>
<line x1="340" y1="256" x2="340" y2="280" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- DECISÃO 1 -->
<rect x="200" y="280" width="280" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="13" font-weight="bold" fill="#633806" x="340" y="303" text-anchor="middle">Proprietário cadastrado?</text>
<text font-size="11" fill="#854F0B" x="340" y="321" text-anchor="middle">Buscar por nome ou CPF</text>

<!-- Não → esquerda -->
<line x1="200" y1="306" x2="140" y2="306" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-size="11" fill="#555" x="167" y="298" text-anchor="middle">Não</text>
<rect x="40" y="280" width="100" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="12" font-weight="bold" fill="#3C3489" x="90" y="300" text-anchor="middle">Cadastrar</text>
<text font-size="11" fill="#534AB7" x="90" y="318" text-anchor="middle">proprietário</text>
<line x1="90" y1="332" x2="90" y2="410" stroke="#888" stroke-width="1"/>
<line x1="90" y1="410" x2="220" y2="410" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Sim ↓ -->
<line x1="340" y1="332" x2="340" y2="356" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-size="11" fill="#555" x="352" y="348">Sim</text>

<!-- DECISÃO 2 -->
<rect x="200" y="356" width="280" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="13" font-weight="bold" fill="#633806" x="340" y="379" text-anchor="middle">Animal cadastrado?</text>
<text font-size="11" fill="#854F0B" x="340" y="397" text-anchor="middle">Vincular ao proprietário</text>

<!-- Não → direita -->
<line x1="480" y1="382" x2="540" y2="382" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-size="11" fill="#555" x="512" y="374" text-anchor="middle">Não</text>
<rect x="540" y="356" width="100" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="12" font-weight="bold" fill="#3C3489" x="590" y="376" text-anchor="middle">Cadastrar</text>
<text font-size="11" fill="#534AB7" x="590" y="394" text-anchor="middle">animal</text>
<line x1="590" y1="408" x2="590" y2="450" stroke="#888" stroke-width="1"/>
<line x1="590" y1="450" x2="480" y2="450" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Sim ↓ -->
<line x1="340" y1="408" x2="340" y2="432" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-size="11" fill="#555" x="352" y="424">Sim</text>

<!-- 3. Agendar -->
<rect x="200" y="432" width="280" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="13" font-weight="bold" fill="#085041" x="340" y="455" text-anchor="middle">Agendar consulta</text>
<text font-size="11" fill="#0F6E56" x="340" y="473" text-anchor="middle">Tipo, data/hora, observações</text>
<line x1="340" y1="484" x2="340" y2="508" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- DECISÃO 3 -->
<rect x="200" y="508" width="280" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="13" font-weight="bold" fill="#633806" x="340" y="531" text-anchor="middle">Data e hora válidas?</text>
<text font-size="11" fill="#854F0B" x="340" y="549" text-anchor="middle">Não permite datas passadas</text>

<!-- Não → loop -->
<line x1="480" y1="534" x2="530" y2="534" stroke="#888" stroke-width="1"/>
<line x1="530" y1="534" x2="530" y2="458" stroke="#888" stroke-width="1"/>
<line x1="530" y1="458" x2="482" y2="458" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="11" fill="#555" x="512" y="526" text-anchor="middle">Não</text>

<!-- Sim ↓ -->
<line x1="340" y1="560" x2="340" y2="584" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-size="11" fill="#555" x="352" y="576">Sim</text>

<!-- 4. Consulta agendada -->
<rect x="200" y="584" width="280" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="13" font-weight="bold" fill="#085041" x="340" y="607" text-anchor="middle">Consulta agendada</text>
<text font-size="11" fill="#0F6E56" x="340" y="625" text-anchor="middle">Status: agendado</text>
<line x1="340" y1="636" x2="340" y2="660" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- 5. Atualizar status -->
<rect x="180" y="660" width="320" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="13" font-weight="bold" fill="#3C3489" x="340" y="683" text-anchor="middle">Atualizar status</text>
<text font-size="11" fill="#534AB7" x="340" y="701" text-anchor="middle">Confirmado → realizado / cancelado</text>
<line x1="340" y1="712" x2="340" y2="736" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- FIM -->
<rect x="255" y="736" width="170" height="40" rx="20" fill="#E8E8E4" stroke="#888" stroke-width="0.5"/>
<text font-size="13" font-weight="bold" fill="#333" x="340" y="761" text-anchor="middle">Fim</text>

<!-- LEGENDA — deslocada para baixo, fora do fluxo -->
<rect x="20" y="796" width="640" height="56" rx="8" fill="#F9F9F9" stroke="#DDD" stroke-width="0.5"/>
<text font-size="11" font-weight="bold" fill="#555" x="36" y="814">Legenda</text>
<rect x="36" y="822" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="11" fill="#333" x="54" y="833">Ação no sistema</text>
<rect x="170" y="822" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="11" fill="#333" x="188" y="833">Decisão</text>
<rect x="280" y="822" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="11" fill="#333" x="298" y="833">Cadastro / atualização</text>
<rect x="450" y="822" width="12" height="12" rx="2" fill="#E8E8E4" stroke="#888" stroke-width="0.5"/>
<text font-size="11" fill="#333" x="468" y="833">Início / fim</text>
</svg>
