<svg width="680" height="920" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; font-family: Arial, sans-serif;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Título -->
<text font-size="15" font-weight="bold" fill="#1B1B1B" x="340" y="24" text-anchor="middle">Fluxo completo — VETSystem (swimlane)</text>

<!-- RAIAS -->
<rect x="20" y="38" width="190" height="836" rx="10" fill="#F5F5F3" stroke="#CCC" stroke-width="0.5"/>
<text font-size="13" font-weight="bold" fill="#333" x="115" y="60" text-anchor="middle">Tutor</text>
<text font-size="11" fill="#888" x="115" y="75" text-anchor="middle">(cliente da clínica)</text>

<rect x="220" y="38" width="240" height="836" rx="10" fill="#F5F5F3" stroke="#CCC" stroke-width="0.5"/>
<text font-size="13" font-weight="bold" fill="#333" x="340" y="60" text-anchor="middle">VETSystem</text>
<text font-size="11" fill="#888" x="340" y="75" text-anchor="middle">(aplicação Django)</text>

<rect x="470" y="38" width="190" height="836" rx="10" fill="#F5F5F3" stroke="#CCC" stroke-width="0.5"/>
<text font-size="13" font-weight="bold" fill="#333" x="565" y="60" text-anchor="middle">Veterinária</text>
<text font-size="11" fill="#888" x="565" y="75" text-anchor="middle">(Sra. Fernanda)</text>

<!-- INÍCIO -->
<rect x="255" y="92" width="170" height="36" rx="18" fill="#E8E8E4" stroke="#888" stroke-width="0.5"/>
<text font-size="13" font-weight="bold" fill="#333" x="340" y="115" text-anchor="middle">Início</text>

<!-- Tutor solicita -->
<rect x="30" y="148" width="170" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="12" font-weight="bold" fill="#712B13" x="115" y="168" text-anchor="middle">Solicitar agendamento</text>
<text font-size="11" fill="#993C1D" x="115" y="186" text-anchor="middle">telefone ou presencial</text>
<!-- seta tutor → vet -->
<line x1="200" y1="174" x2="468" y2="174" stroke="#999" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text font-size="10" fill="#888" x="340" y="168" text-anchor="middle">solicita</text>

<!-- Vet recebe -->
<rect x="480" y="148" width="170" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="12" font-weight="bold" fill="#085041" x="565" y="168" text-anchor="middle">Receber solicitação</text>
<text font-size="11" fill="#0F6E56" x="565" y="186" text-anchor="middle">abre o VETSystem</text>
<line x1="565" y1="200" x2="565" y2="224" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Vet login -->
<rect x="480" y="224" width="170" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="12" font-weight="bold" fill="#085041" x="565" y="244" text-anchor="middle">Efetuar login</text>
<text font-size="11" fill="#0F6E56" x="565" y="262" text-anchor="middle">usuário e senha</text>
<line x1="480" y1="250" x2="462" y2="250" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Sistema: autenticar -->
<rect x="230" y="224" width="230" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="12" font-weight="bold" fill="#3C3489" x="345" y="244" text-anchor="middle">Autenticar usuário</text>
<text font-size="11" fill="#534AB7" x="345" y="262" text-anchor="middle">sessão Django ativa</text>
<line x1="345" y1="276" x2="345" y2="300" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Sistema: busca -->
<rect x="230" y="300" width="230" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="12" font-weight="bold" fill="#3C3489" x="345" y="320" text-anchor="middle">Buscar proprietário</text>
<text font-size="11" fill="#534AB7" x="345" y="338" text-anchor="middle">/proprietarios/?q=nome</text>
<line x1="345" y1="352" x2="345" y2="372" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- DECISÃO: cadastrado? -->
<rect x="230" y="372" width="230" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="12" font-weight="bold" fill="#633806" x="345" y="392" text-anchor="middle">Cadastrado?</text>
<text font-size="11" fill="#854F0B" x="345" y="410" text-anchor="middle">proprietário + animal</text>

<!-- Não → vet cadastra -->
<line x1="460" y1="398" x2="478" y2="398" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-size="11" fill="#555" x="470" y="390" text-anchor="middle">Não</text>
<rect x="480" y="372" width="170" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="12" font-weight="bold" fill="#085041" x="565" y="392" text-anchor="middle">Cadastrar proprietário</text>
<text font-size="11" fill="#0F6E56" x="565" y="410" text-anchor="middle">e animal</text>
<line x1="565" y1="424" x2="565" y2="452" stroke="#888" stroke-width="1"/>
<line x1="565" y1="452" x2="462" y2="452" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Sim ↓ -->
<line x1="345" y1="424" x2="345" y2="448" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-size="11" fill="#555" x="357" y="440">Sim</text>

<!-- Sistema: exibir agenda -->
<rect x="230" y="448" width="230" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="12" font-weight="bold" fill="#3C3489" x="345" y="468" text-anchor="middle">Exibir agenda</text>
<text font-size="11" fill="#534AB7" x="345" y="486" text-anchor="middle">/consultas/nova/</text>

<!-- Vet seleciona horário -->
<line x1="462" y1="474" x2="480" y2="474" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="480" y="448" width="170" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="12" font-weight="bold" fill="#085041" x="565" y="468" text-anchor="middle">Selecionar horário</text>
<text font-size="11" fill="#0F6E56" x="565" y="486" text-anchor="middle">data, tipo, observações</text>
<line x1="345" y1="500" x2="345" y2="524" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- DECISÃO: data válida? -->
<rect x="230" y="524" width="230" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="12" font-weight="bold" fill="#633806" x="345" y="544" text-anchor="middle">Data válida?</text>
<text font-size="11" fill="#854F0B" x="345" y="562" text-anchor="middle">não permite passado</text>

<!-- Não → loop -->
<line x1="230" y1="550" x2="212" y2="550" stroke="#888" stroke-width="1"/>
<line x1="212" y1="550" x2="212" y2="474" stroke="#888" stroke-width="1"/>
<line x1="212" y1="474" x2="228" y2="474" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="11" fill="#555" x="196" y="516" text-anchor="middle">Não</text>

<!-- Sim ↓ -->
<line x1="345" y1="576" x2="345" y2="600" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-size="11" fill="#555" x="357" y="592">Sim</text>

<!-- Sistema: salva -->
<rect x="230" y="600" width="230" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="12" font-weight="bold" fill="#3C3489" x="345" y="620" text-anchor="middle">Salvar consulta</text>
<text font-size="11" fill="#534AB7" x="345" y="638" text-anchor="middle">status: agendado</text>

<!-- Tutor recebe confirmação -->
<line x1="230" y1="626" x2="202" y2="626" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="30" y="600" width="170" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="12" font-weight="bold" fill="#712B13" x="115" y="620" text-anchor="middle">Receber confirmação</text>
<text font-size="11" fill="#993C1D" x="115" y="638" text-anchor="middle">telefone / WhatsApp</text>
<line x1="345" y1="652" x2="345" y2="676" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Vet realiza atendimento -->
<rect x="480" y="676" width="170" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="12" font-weight="bold" fill="#085041" x="565" y="696" text-anchor="middle">Realizar atendimento</text>
<text font-size="11" fill="#0F6E56" x="565" y="714" text-anchor="middle">dia da consulta</text>
<line x1="480" y1="702" x2="462" y2="702" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Sistema: atualiza status -->
<rect x="230" y="676" width="230" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="12" font-weight="bold" fill="#3C3489" x="345" y="696" text-anchor="middle">Atualizar status</text>
<text font-size="11" fill="#534AB7" x="345" y="714" text-anchor="middle">realizado / cancelado</text>
<line x1="345" y1="728" x2="345" y2="752" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- FIM -->
<rect x="255" y="752" width="170" height="36" rx="18" fill="#E8E8E4" stroke="#888" stroke-width="0.5"/>
<text font-size="13" font-weight="bold" fill="#333" x="340" y="775" text-anchor="middle">Fim</text>

<!-- LEGENDA -->
<rect x="20" y="806" width="640" height="56" rx="8" fill="#F9F9F9" stroke="#DDD" stroke-width="0.5"/>
<text font-size="11" font-weight="bold" fill="#555" x="36" y="824">Legenda</text>
<rect x="36" y="832" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="11" fill="#333" x="54" y="843">Tutor</text>
<rect x="120" y="832" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="11" fill="#333" x="138" y="843">Sistema</text>
<rect x="220" y="832" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="11" fill="#333" x="238" y="843">Veterinária</text>
<rect x="340" y="832" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="11" fill="#333" x="358" y="843">Decisão</text>
<rect x="440" y="832" width="12" height="12" rx="2" fill="#E8E8E4" stroke="#888" stroke-width="0.5"/>
<text font-size="11" fill="#333" x="458" y="843">Início / fim</text>
</svg>
