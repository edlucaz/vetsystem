# render.yaml — Configuração do deploy no Render (plano gratuito)
# Documentação: https://render.com/docs/render-yaml-reference
#
# VETSystem — ATIVO PET | Projeto Integrador UNIVESP 2026

services:
  - type: web
    name: vetsystem
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "bash start.sh"
    plan: free

    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: vetsystem-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: vetsystem-db
    plan: free
    databaseName: vetsystem
    user: vetsystem
